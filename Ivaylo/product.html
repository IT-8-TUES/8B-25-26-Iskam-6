<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bamazone</title>
  <link rel="stylesheet" href="../shared/shared-styles.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header id="header"></header>
  <div class="container">
    <section class="product-image">
      <div class="image-placeholder">
        <p>No Product Image</p>
      </div>
    </section>

    <section class="product-details">
      <h1 class="product-title">Product Not Available</h1>

      <div class="product-rating">
        <span class="rating-unavailable">Rating Unavailable</span>
      </div>

      <div class="product-price">
        <p class="price-label">Price:</p>
        <p class="price-value">--</p>
      </div>

      <div class="product-status">
        <p class="status-message">This product is currently out of stock or unavailable</p>
      </div>

      <div class="product-info">
        <table>
          <tbody>
            <tr>
              <td class="info-label">Brand</td>
              <td class="info-value">--</td>
            </tr>
            <tr>
              <td class="info-label">Manufacturer</td>
              <td class="info-value">--</td>
            </tr>
            <tr>
              <td class="info-label">Model</td>
              <td class="info-value">--</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="product-description">
        <h2>About this item</h2>
        <p>No product information available</p>
      </div>

      <section class="product-actions">
        <div class="quantity-selector">
          <label for="quantity">Quantity:</label>
          <input type="number" id="quantity" value="1" disabled="">
        </div>

        <button class="btn btn-add-cart" disabled="">Add to cart</button>
        <button class="btn btn-buy-now" disabled="">Buy Now</button>

        <button class="btn btn-add-list">Add to List</button>
      </section>

      <div class="seller-info">
        <p>Shipper / Seller: <strong>Not Available</strong></p>
      </div>
    </section>
  </div>

  <script src="../shared/loader.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const searchQuery = urlParams.get('q');

    if (searchQuery) {
      //търси продукта
    }
  </script>

</body>

</html>
